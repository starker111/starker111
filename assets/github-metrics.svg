<svg width="1200" height="170" viewBox="0 0 1200 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Extended GitHub metrics fallback</title>
  <desc id="desc">A safe fallback shown until the optional metrics workflow generates an updated image.</desc>
  <rect width="1200" height="170" rx="20" fill="#FAFAF8"/>
  <rect x=".75" y=".75" width="1198.5" height="168.5" rx="19.25" stroke="#E5E5E2" stroke-width="1.5"/>
  <circle cx="58" cy="54" r="5" fill="#FF6B35"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="76" y="60" fill="#111114" font-size="20" font-weight="750">Extended metrics are optional</text>
    <text x="58" y="101" fill="#6B7280" font-size="14">The profile remains complete if the metrics service is unavailable or rate-limited.</text>
    <text x="58" y="132" fill="#D94D18" font-family="ui-monospace, Consolas, monospace" font-size="10" font-weight="700" letter-spacing="1.2">FALLBACK ACTIVE</text>
  </g>
</svg>
