<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Automation System Pipeline</title>
  <desc id="desc">A six-stage pipeline from signal ingestion through measured outcomes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300"><stop stop-color="#0B1220"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <linearGradient id="line" x1="80" y1="0" x2="1120" y2="0"><stop stop-color="#334155"/><stop offset=".5" stop-color="#FF7A18"/><stop offset="1" stop-color="#334155"/></linearGradient>
  </defs>
  <rect x=".75" y=".75" width="1198.5" height="298.5" rx="24" fill="url(#bg)" stroke="#334155" stroke-width="1.5"/>
  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="50" y="48" fill="#FF8A2A" font-size="12" font-weight="800" letter-spacing="2">AI AUTOMATION SYSTEM PIPELINE</text>
    <text x="50" y="78" fill="#F8FAFC" font-size="22" font-weight="750">From raw signal to measurable action</text>
    <path d="M98 164H1102" stroke="url(#line)" stroke-width="3"/>
    <g>
      <circle cx="100" cy="164" r="28" fill="#172033" stroke="#475569"/><text x="100" y="169" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="800">01</text>
      <text x="100" y="216" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="700">INGEST</text><text x="100" y="239" text-anchor="middle" fill="#94A3B8" font-size="11">docs · events · APIs</text>
    </g>
    <g>
      <circle cx="300" cy="164" r="28" fill="#172033" stroke="#475569"/><text x="300" y="169" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="800">02</text>
      <text x="300" y="216" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="700">UNDERSTAND</text><text x="300" y="239" text-anchor="middle" fill="#94A3B8" font-size="11">classify · extract</text>
    </g>
    <g>
      <circle cx="500" cy="164" r="34" fill="#271A11" stroke="#FF7A18" stroke-width="2"/><text x="500" y="169" text-anchor="middle" fill="#FF9A4A" font-size="14" font-weight="800">03</text>
      <text x="500" y="216" text-anchor="middle" fill="#FF9A4A" font-size="14" font-weight="800">REASON</text><text x="500" y="239" text-anchor="middle" fill="#94A3B8" font-size="11">agents · retrieval</text>
    </g>
    <g>
      <circle cx="700" cy="164" r="34" fill="#271A11" stroke="#FF7A18" stroke-width="2"/><text x="700" y="169" text-anchor="middle" fill="#FF9A4A" font-size="14" font-weight="800">04</text>
      <text x="700" y="216" text-anchor="middle" fill="#FF9A4A" font-size="14" font-weight="800">ORCHESTRATE</text><text x="700" y="239" text-anchor="middle" fill="#94A3B8" font-size="11">tools · workflows</text>
    </g>
    <g>
      <circle cx="900" cy="164" r="28" fill="#172033" stroke="#475569"/><text x="900" y="169" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="800">05</text>
      <text x="900" y="216" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="700">DELIVER</text><text x="900" y="239" text-anchor="middle" fill="#94A3B8" font-size="11">reports · actions</text>
    </g>
    <g>
      <circle cx="1100" cy="164" r="28" fill="#172033" stroke="#22C55E"/><text x="1100" y="169" text-anchor="middle" fill="#86EFAC" font-size="14" font-weight="800">06</text>
      <text x="1100" y="216" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="700">MEASURE</text><text x="1100" y="239" text-anchor="middle" fill="#94A3B8" font-size="11">logs · feedback</text>
    </g>
  </g>
</svg>
