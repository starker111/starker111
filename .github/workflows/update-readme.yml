name: Refresh profile README

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/generate-readme.js"
      - "scripts/generate-hero-svg.js"
      - "scripts/generate-project-cards.js"
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

concurrency:
  group: profile-readme-refresh
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate dashboard assets and README
        run: |
          node scripts/generate-hero-svg.js
          node scripts/generate-project-cards.js
          node scripts/generate-readme.js

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "Generated files are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/hero.svg assets/pipeline.svg assets/footer.svg data/project-cards.generated.md
          git commit -m "chore: refresh profile command center"
          git push
