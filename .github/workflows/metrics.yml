name: Generate advanced GitHub metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "41 1 * * 0,3"

permissions:
  contents: write

concurrency:
  group: github-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Build metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: starker111
          template: classic
          filename: assets/github-metrics.svg
          base: header, activity, community, repositories, metadata
          config_theme: light
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 0, 8 + 11%
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%
          plugin_notable: yes
          plugin_notable_filter: stars:>1
          plugin_notable_repositories: yes
          plugin_notable_types: commit

      - name: Commit metrics when updated
        run: |
          if git diff --quiet -- assets/github-metrics.svg; then
            echo "Metrics image is already current or generation was skipped."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-metrics.svg
          git commit -m "chore: update GitHub metrics"
          git push
