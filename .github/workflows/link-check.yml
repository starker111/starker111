name: Check shipped project links

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/projects.json"
      - "scripts/check-project-links.js"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "12 4 * * 2,5"

permissions:
  contents: write
  issues: write

concurrency:
  group: profile-link-check
  cancel-in-progress: true

jobs:
  project-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Tier 1 deployments and update status data
        id: links
        continue-on-error: true
        run: node scripts/check-project-links.js

      - name: Regenerate status-driven profile
        run: |
          node scripts/generate-hero-svg.js
          node scripts/generate-project-cards.js
          node scripts/generate-readme.js

      - name: Commit latest link status
        run: |
          if git diff --quiet; then
            echo "Link status is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/project-status.json data/project-cards.generated.md README.md assets/hero.svg assets/pipeline.svg assets/footer.svg
          git commit -m "chore: refresh project availability"
          git push

      - name: Open or update a link failure issue
        if: steps.links.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Profile project link check failed";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });
            if (!existing.data.some(issue => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `A scheduled check found at least one unavailable shipped-project URL.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }

      - name: Fail when a shipped project is unavailable
        if: steps.links.outcome == 'failure'
        run: exit 1
