name: Check profile links

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/projects.json"
      - "scripts/check-project-links.js"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "12 4 * * 2,5"

permissions:
  contents: read

concurrency:
  group: profile-link-check
  cancel-in-progress: true

jobs:
  project-links:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate configured live demos and repositories
        run: node scripts/check-project-links.js
